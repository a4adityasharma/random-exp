services:
  - type: web
    name: sentilytics-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: VITE_API_URL
        value: https://sentilytics-backend.onrender.com/api
      - key: NODE_ENV
        value: production

  - type: web
    name: sentilytics-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.analyze:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
